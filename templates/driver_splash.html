<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resuming Driver Mode - Surakshit Yatra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3c72;
            --accent: #10b981;
            --bg: #0f172a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* Luxurious Swirling Ring */
        .swirl-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
        }

        .swirl-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: var(--accent);
            border-right-color: var(--accent);
            border-radius: 50%;
            animation: swirl 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .swirl-ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top-color: #3b82f6;
            animation-duration: 1.2s;
            animation-direction: reverse;
        }

        .swirl-ring:nth-child(3) {
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            border-top-color: #f59e0b;
            animation-duration: 0.8s;
        }

        .logo-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
        }

        h2 {
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        p {
            color: #94a3b8;
            font-weight: 500;
        }

        /* Bottom Persistent Links */
        .management-footer {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        .links-group {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .mgmt-link {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
        }

        .mgmt-link:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }

        @keyframes swirl {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar (Simulating work) */
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 2rem auto 0;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: var(--accent);
            animation: progress 2s linear forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/unified-theme.css') }}">
</head>
<body>
    <div class="splash-container">
        <div class="swirl-wrapper">
            <div class="swirl-ring"></div>
            <div class="swirl-ring"></div>
            <div class="swirl-ring"></div>
            <div class="logo-icon">🚌</div>
        </div>
        <h2>Driver Mode</h2>
        <p>Resuming system identification...</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="management-footer">
        <span style="font-size: 0.7rem; color: #475569; letter-spacing: 2px;">MANAGEMENT PORTAL</span>
        <div class="links-group">
            <a href="/depot/login" class="mgmt-link">🏢 Smart Depot</a>
            <a href="/api/system/reset-mode" class="mgmt-link" style="color: #ef4444;">🔄 Reset System Settings</a>
        </div>
    </div>

    <script>
        // Automatic redirect after animation
        setTimeout(() => {
            window.location.href = '/driver/auto-login';
        }, 2200);
    </script>
</body>
</html>
