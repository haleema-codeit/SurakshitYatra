<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surakshit Yatra | Fleet Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: #f1f5f9;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation */
        .control-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: white;
            text-decoration: none;
        }

        .brand i {
            color: var(--primary);
            font-size: 1.5rem;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Main Workspace */
        .workspace {
            flex: 1;
            display: flex;
            position: relative;
        }

        /* Sidebar */
        .control-sidebar {
            width: 380px;
            background: var(--dark-light);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .search-box {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }

        .fleet-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .fleet-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .fleet-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .fleet-card.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .fleet-card.warning { border-left: 4px solid var(--warning); }
        .fleet-card.danger { border-left: 4px solid var(--danger); }
        .fleet-card.safe { border-left: 4px solid var(--success); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .bus-id { font-weight: 700; font-size: 1.1rem; }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Map Container */
        .map-wrapper {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #0f172a;
        }

        /* Map UI Elements */
        .map-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stats-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.25rem;
            min-width: 200px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .stat-label { font-size: 0.8rem; color: #94a3b8; }
        .stat-value { font-weight: 700; }

        /* Custom Marker Styles */
        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .marker-pin {
            width: 34px;
            height: 34px;
            border-radius: 50% 50% 50% 0;
            background: var(--primary);
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -17px 0 0 -17px;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .marker-pin::after {
            content: '';
            width: 24px;
            height: 24px;
            margin: 3px 0 0 3px;
            background: #fff;
            position: absolute;
            border-radius: 50%;
        }

        .marker-icon {
            position: absolute;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-size: 12px;
            z-index: 10;
        }

        .marker-pulse {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.4);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Marker Colors */
        .marker-safe .marker-pin { background: var(--success); }
        .marker-warning .marker-pin { background: var(--warning); }
        .marker-danger .marker-pin { background: var(--danger); }
        .marker-danger .marker-pulse { background: rgba(239, 68, 68, 0.4); }

        /* Loading Overlay */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
        }

        .custom-toast {
            background: var(--dark-light);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideLeft 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideLeft {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Leaflet Overrides */
        .leaflet-popup-content-wrapper {
            background: var(--dark-light);
            color: white;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }
        .leaflet-popup-tip { background: var(--dark-light); }
        .leaflet-control-zoom a {
            background: var(--dark-light) !important;
            color: white !important;
            border: 1px solid var(--glass-border) !important;
        }

    </style>
</head>
<body>
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p class="mt-3 text-muted">Initializing Fleet Control...</p>
    </div>

    <nav class="control-nav">
        <a href="{{ url_for('depot_dashboard') }}" class="brand">
            <i class="fas fa-shield-halved"></i>
            <span>SURAKSHIT YATRA CONTROL</span>
        </a>
        <div class="nav-actions">
            <div id="connection-status" class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2">
                <i class="fas fa-link me-2"></i> SYSTEM LINKED
            </div>
            <button id="refresh-btn" class="btn btn-dark btn-sm border border-secondary-subtle">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </nav>

    <div class="workspace">
        <aside class="control-sidebar">
            <div class="sidebar-header">
                <h6 class="text-uppercase text-muted fw-bold small">Fleet Overview</h6>
                <div class="search-box">
                    <i class="fas fa-search text-muted"></i>
                    <input type="text" id="bus-search" placeholder="Search by bus number or route...">
                </div>
            </div>
            <div class="fleet-list" id="bus-list">
                <!-- Bus cards will be injected here -->
            </div>
        </aside>

        <main class="map-wrapper">
            <div id="map"></div>
            
            <div class="map-overlay">
                <div class="stats-panel">
                    <h6 class="text-uppercase text-muted fw-bold small mb-3">Live Metrics</h6>
                    <div class="stat-item">
                        <span class="stat-label">Total Fleet</span>
                        <span class="stat-value" id="stat-total">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label text-success">Active Units</span>
                        <span class="stat-value text-success" id="stat-active">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label text-warning">Warnings</span>
                        <span class="stat-value text-warning" id="stat-warning">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label text-danger">Emergency</span>
                        <span class="stat-value text-danger" id="stat-danger">0</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>

    <script>
        // Configuration
        const MAP_CENTER = [28.7041, 77.1025]; // Default Delhi
        const MAP_ZOOM = 13;
        
        // State
        const busMarkers = {};
        const busData = {};
        let activeBusId = null;

        // Initialize Map with Premium Light Theme
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView(MAP_CENTER, MAP_ZOOM);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Socket.io Connection
        const socket = io();

        socket.on('connect', () => {
            console.log('✅ Connected to Control Server');
            document.getElementById('connection-status').innerHTML = '<i class="fas fa-link me-2"></i> SYSTEM LINKED';
            document.getElementById('connection-status').className = 'badge bg-success-subtle text-success border border-success-subtle px-3 py-2';
            requestAllBuses();
        });

        socket.on('disconnect', () => {
            document.getElementById('connection-status').innerHTML = '<i class="fas fa-unlink me-2"></i> LINK LOST';
            document.getElementById('connection-status').className = 'badge bg-danger-subtle text-danger border border-danger-subtle px-3 py-2';
        });

        socket.on('bus_location_update', (data) => {
            updateBusMarker(data);
            if (data.status === 'Warning' || data.status === 'Danger') {
                showToast(`Alert: ${data.bus_number} reported ${data.status.toUpperCase()}`, data.status.toLowerCase());
            }
        });

        socket.on('all_buses_data', (data) => {
            updateAllBuses(data.buses);
            hideLoader();
        });

        function requestAllBuses() {
            socket.emit('request_all_buses');
        }

        async function fetchAllBuses() {
            try {
                const response = await fetch('/api/tracking/all-buses');
                const data = await response.json();
                if (data.buses) updateAllBuses(data.buses);
            } catch (error) {
                console.error('Error fetching buses:', error);
            }
        }

        function updateAllBuses(buses) {
            const bounds = [];
            buses.forEach(bus => {
                busData[bus.id] = bus;
                const marker = updateBusMarker(bus);
                if (marker) {
                    bounds.push(marker.getLatLng());
                }
            });
            
            // Auto-adjust map view to see all buses if this is the first load
            if (bounds.length > 0) {
                map.fitBounds(bounds, {
                    padding: [50, 50],
                    maxZoom: 15
                });
            }
            
            updateMetrics();
            updateSidebar();
        }

        function getStatusColor(status) {
            switch(status) {
                case 'Danger': return 'var(--danger)';
                case 'Warning': return 'var(--warning)';
                case 'In Service': return 'var(--success)';
                case 'Available': return 'var(--primary)';
                default: return 'var(--secondary)';
            }
        }

        function getMarkerClass(status) {
            switch(status) {
                case 'Danger': return 'marker-danger';
                case 'Warning': return 'marker-warning';
                case 'In Service': return 'marker-safe';
                default: return 'marker-idle';
            }
        }

        function updateBusMarker(bus) {
            const busId = bus.id || bus.bus_id;
            let lat = bus.latitude;
            let lon = bus.longitude;
            const status = bus.status || 'Offline';
            
            // If no GPS, or invalid GPS (0,0), show at Depot location
            let isAtDepot = false;
            const isInvalidCoords = !lat || !lon || (Math.abs(lat) < 0.01 && Math.abs(lon) < 0.01);
            
            if (isInvalidCoords) {
                // Scatter buses significantly so they don't stack at high zoom levels
                const pseudoRandomLatOffset = (Math.sin(busId * 999) * 0.08);
                const pseudoRandomLonOffset = (Math.cos(busId * 999) * 0.08);
                
                lat = (bus.depot_lat || MAP_CENTER[0]) + pseudoRandomLatOffset;
                lon = (bus.depot_lon || MAP_CENTER[1]) + pseudoRandomLonOffset;
                isAtDepot = true;
            }
            const color = getStatusColor(status);
            const markerClass = getMarkerClass(status);

            // Update stored data
            if (busData[busId]) {
                Object.assign(busData[busId], bus);
                busData[busId].lat = lat;
                busData[busId].lon = lon;
            } else {
                busData[busId] = {...bus, lat, lon};
            }

            // Create Icon
            const icon = L.divIcon({
                html: `
                    <div class="custom-marker ${markerClass} ${isAtDepot ? 'at-depot' : ''}">
                        ${status === 'Danger' ? '<div class="marker-pulse"></div>' : ''}
                        <div class="marker-pin"></div>
                        <div class="marker-icon"><i class="fas fa-bus"></i></div>
                    </div>
                `,
                className: '',
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });

            if (busMarkers[busId]) {
                busMarkers[busId].setLatLng([lat, lon]);
                busMarkers[busId].setIcon(icon);
            } else {
                const marker = L.marker([lat, lon], { icon: icon }).addTo(map);
                
                const popupContent = `
                    <div class="p-2" style="color: white; min-width: 200px;">
                        <div class="fw-bold border-bottom border-secondary pb-1 mb-2 d-flex justify-content-between">
                            <span>${bus.bus_number}</span>
                            <span class="badge ${bus.is_assigned ? 'bg-primary' : 'bg-secondary'}" style="font-size: 0.6rem;">
                                ${bus.is_assigned ? 'ASSIGNED' : 'IDLE'}
                            </span>
                        </div>
                        <div class="small mb-1"><span class="text-muted">Driver:</span> <span class="text-white">${bus.driver_name || 'N/A'}</span></div>
                        <div class="small mb-1"><span class="text-muted">Route:</span> <span class="text-white">${bus.route_label || 'N/A'}</span></div>
                        <div class="small mb-1"><span class="text-muted">Status:</span> <span style="color: ${color}">${isAtDepot ? 'At ' + (bus.depot_name || 'Depot') : status}</span></div>
                        <div class="small mb-1"><span class="text-muted">Fuel:</span> ${bus.fuel_level || 0}%</div>
                        <div class="small mb-2"><span class="text-muted">Last Update:</span> ${isAtDepot ? 'No Live GPS' : new Date().toLocaleTimeString()}</div>
                        <button class="btn btn-primary btn-sm w-100 mt-2" onclick="focusBus(${busId})">Track Unit</button>
                    </div>
                `;
                marker.bindPopup(popupContent);
                busMarkers[busId] = marker;
            }

            return busMarkers[busId];
        }

        function updateMetrics() {
            const buses = Object.values(busData);
            document.getElementById('stat-total').textContent = buses.length;
            document.getElementById('stat-active').textContent = buses.filter(b => b.status === 'In Service').length;
            document.getElementById('stat-warning').textContent = buses.filter(b => b.status === 'Warning').length;
            document.getElementById('stat-danger').textContent = buses.filter(b => b.status === 'Danger').length;
        }

        function updateSidebar() {
            const list = document.getElementById('bus-list');
            const buses = Object.values(busData);
            const searchTerm = document.getElementById('bus-search').value.toLowerCase();

            let html = '';
            buses.filter(bus => 
                bus.bus_number.toLowerCase().includes(searchTerm) || 
                (bus.status && bus.status.toLowerCase().includes(searchTerm)) ||
                (bus.driver_name && bus.driver_name.toLowerCase().includes(searchTerm)) ||
                (bus.route_label && bus.route_label.toLowerCase().includes(searchTerm))
            ).forEach(bus => {
                const status = bus.status || 'Offline';
                const statusClass = status.toLowerCase().replace(' ', '-');
                const color = getStatusColor(status);
                
                html += `
                    <div class="fleet-card ${status.toLowerCase()} ${activeBusId === bus.id ? 'active' : ''} ${!bus.is_assigned ? 'opacity-75' : ''}" onclick="focusBus(${bus.id})">
                        <div class="card-header">
                            <span class="bus-id">${bus.bus_number}</span>
                            <div>
                                <span class="status-dot" style="background: ${color}"></span>
                                <span class="status-text" style="color: ${color}">${status}</span>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="col-12 mb-1"><i class="fas fa-user-tie me-1"></i> ${bus.driver_name || 'No Driver'}</div>
                            <div class="col-12 mb-1"><i class="fas fa-route me-1"></i> ${bus.route_label || 'No Route'}</div>
                            <div><i class="fas fa-gas-pump me-1"></i> ${bus.fuel_level || 0}%</div>
                            <div><i class="fas fa-clock me-1"></i> ${new Date().toLocaleTimeString()}</div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html || '<div class="text-center p-4 text-muted">No active units matching search</div>';
        }

        function focusBus(busId) {
            const bus = busData[busId];
            if (bus && bus.latitude && bus.longitude) {
                activeBusId = busId;
                map.flyTo([bus.latitude, bus.longitude], 16, { duration: 1.5 });
                busMarkers[busId].openPopup();
                updateSidebar();
            }
        }

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `custom-toast`;
            if (type === 'danger') toast.style.borderLeftColor = 'var(--danger)';
            if (type === 'warning') toast.style.borderLeftColor = 'var(--warning)';
            
            toast.innerHTML = `
                <i class="fas ${type === 'danger' ? 'fa-triangle-exclamation text-danger' : 'fa-circle-exclamation text-warning'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }

        // Search handler
        document.getElementById('bus-search').addEventListener('input', updateSidebar);

        // Refresh handler
        document.getElementById('refresh-btn').addEventListener('click', () => {
            fetchAllBuses();
            showToast('Refreshing Fleet Data...', 'info');
        });

        // Auto Refresh
        setInterval(fetchAllBuses, 5000);

        // Map Click (for debugging coords)
        map.on('click', e => console.log(`Coords: ${e.latlng.lat}, ${e.latlng.lng}`));

    </script>
</body>
</html>
