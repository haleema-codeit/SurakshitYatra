<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Route</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/unified-theme.css') }}">
</head>
<body style="background-color: #ecf0f1;">
    <div class="container mt-5">
        <a href="{{ url_for('manage_routes') }}" class="btn btn-outline-secondary mb-3">← Back</a>
        
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5>Create New Route</h5>
                    </div>
                    <div class="card-body">
                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Route Name</label>
                                <input type="text" class="form-control" name="route_name" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Route Code</label>
                                <input type="text" class="form-control" name="route_code" required 
                                       placeholder="e.g., RT-001">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Depot</label>
                                <select class="form-select" name="depot_id" required>
                                    <option value="">Select Depot</option>
                                    {% for depot in depots %}
                                    <option value="{{ depot.id }}">{{ depot.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Start Point</label>
                                    <input type="text" class="form-control" name="start_point" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">End Point</label>
                                    <input type="text" class="form-control" name="end_point" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Distance (km)</label>
                                    <input type="number" class="form-control" name="distance_km" required step="0.1">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Duration (minutes)</label>
                                    <input type="number" class="form-control" name="duration_minutes" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Demand Level</label>
                                <select class="form-select" name="demand_level">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                    <option value="Peak">Peak</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100">Create Route</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
