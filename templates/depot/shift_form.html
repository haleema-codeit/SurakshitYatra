<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Driver Shift</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/unified-theme.css') }}">
</head>
<body style="background-color: #ecf0f1;">
    <div class="container mt-5">
        <a href="{{ url_for('manage_schedules') }}" class="btn btn-outline-secondary mb-3">← Back</a>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5>Create Driver Shift</h5>
                    </div>
                    <div class="card-body">
                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Driver</label>
                                <select class="form-select" name="driver_id" required>
                                    <option value="">Select Driver</option>
                                    {% for driver in drivers %}
                                    <option value="{{ driver.id }}">{{ driver.name }} - {{ driver.license_number }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Shift Date</label>
                                <input type="date" class="form-control" name="shift_date" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Shift Type</label>
                                <select class="form-select" name="shift_type" required>
                                    <option value="">Select Type</option>
                                    <option value="Morning">Morning (06:00 - 14:00)</option>
                                    <option value="Afternoon">Afternoon (14:00 - 22:00)</option>
                                    <option value="Night">Night (22:00 - 06:00)</option>
                                </select>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Start Time</label>
                                    <input type="time" class="form-control" name="start_time" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">End Time</label>
                                    <input type="time" class="form-control" name="end_time" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100">Create Shift</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
