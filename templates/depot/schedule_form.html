<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/unified-theme.css') }}">
</head>
<body style="background-color: #ecf0f1;">
    <div class="container mt-5">
        <a href="{{ url_for('manage_schedules') }}" class="btn btn-outline-secondary mb-3">← Back</a>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5>Create Bus Schedule</h5>
                    </div>
                    <div class="card-body">
                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Route</label>
                                <select class="form-select" name="route_id" required>
                                    <option value="">Select Route</option>
                                    {% for route in routes %}
                                    <option value="{{ route.id }}">{{ route.route_code }} - {{ route.route_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Schedule Date</label>
                                <input type="date" class="form-control" name="schedule_date" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Departure Time</label>
                                    <input type="time" class="form-control" name="departure_time" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Arrival Time</label>
                                    <input type="time" class="form-control" name="arrival_time" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Trips Per Day</label>
                                <input type="number" class="form-control" name="trips_per_day" value="1" min="1">
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100">Create Schedule</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
