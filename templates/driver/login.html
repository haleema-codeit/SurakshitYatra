<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surakshit Yatra Driver Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }
        
        .logo {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1rem;
            opacity: 0.95;
            margin-bottom: 0.5rem;
        }
        
        .driver-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .form-content {
            padding: 2.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
        }
        
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 0.5rem;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 60, 114, 0.4);
        }
        
        .error {
            background: #fee2e2;
            border: 2px solid #fecaca;
            color: #991b1b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        
        .info-box {
            background: #f0f9ff;
            border-left: 4px solid #1e3c72;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #1e40af;
            line-height: 1.5;
        }
        
        .footer-links {
            text-align: center;
            padding-top: 1.5rem;
            border-top: 1px solid #e0e0e0;
            margin-top: 1.5rem;
        }
        
        .footer-links a {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .footer-links a:hover {
            color: #2a5298;
        }
        
        .contact-admin {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
            font-size: 0.85rem;
            color: #666;
        }
        
        .contact-admin strong {
            color: #333;
        }
        
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                border-radius: 0;
            }
            
            .login-header {
                padding: 2rem 1.5rem;
            }
            
            .logo {
                font-size: 2.2rem;
            }
            
            .form-content {
                padding: 2rem 1.5rem;
            }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/unified-theme.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-header">
            <div class="logo"><img src="{{ url_for('static', filename='logo.png') }}" alt="Surakshit Yatra" style="height:40px; width:auto;"></div>
            <div class="subtitle">Safe Driving Monitor</div>
            <div class="driver-badge">🚗 Driver Portal</div>
        </div>
        
        <div class="form-content">
            {% if error %}
            <div class="error">❌ {{ error }}</div>
            {% endif %}
            
            <div class="info-box">
                👋 Welcome! Sign in with your credentials to start monitoring your driving.
            </div>
            
            <form method="POST" action="{{ url_for('driver_login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="submit-btn">Sign In to Dashboard</button>
            </form>
            
            <div class="contact-admin">
                Don't have an account? <strong>Contact your administrator</strong> to create one.
            </div>
            
            <div class="footer-links">
                <a href="{{ url_for('depot_login') }}">Are you an admin?</a>
            </div>
        </div>
    </div>
</body>
</html>
