<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surakshit Yatra - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3c72;
            --accent: #2563eb;
            --text: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            background: #f8fafc;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        /* Ambient Background */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/light_road_cinematic.png');
            background-size: cover;
            background-position: center;
            filter: brightness(1.1) saturate(1.1);
            z-index: 1;
            transition: transform 20s linear;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.9) 100%);
            z-index: 2;
        }

        /* Initial "Click to Start" Screen */
        #interaction-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 1s;
        }

        .click-prompt {
            text-align: center;
            animation: pulse 2s infinite;
        }

        .click-prompt img {
            width: 140px;
            height: 140px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.1));
            mix-blend-mode: multiply;
            /* Removes white background */
        }

        .click-prompt h2 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: var(--primary);
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        /* Cinematic Content (Hidden initially) */
        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .app-logo-large {
            width: 250px;
            height: 250px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.1));
            mix-blend-mode: multiply;
            /* Removes white background */
        }

        .title-text {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle-text {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 5px;
            color: #64748b;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 2s 1.5s;
        }

        /* State Classes */
        .started #interaction-layer {
            opacity: 0;
            pointer-events: none;
        }

        .started .main-content {
            opacity: 1;
            transform: translateY(0);
        }

        .started .subtitle-text {
            opacity: 1;
        }

        .started .background-image {
            transform: scale(1.2);
        }

        #bg-music {
            display: none;
        }
    </style>
</head>

<body onclick="startExperience()">
    <div class="background-image"></div>
    <div class="overlay"></div>

    <div id="interaction-layer">
        <div class="click-prompt">
            <img src="/static/logo_icon.png" alt="Logo">
            <h2>Tap to Start Journey</h2>
        </div>
    </div>

    <div class="main-content">
        <img src="/static/logo_icon.png" alt="Logo" class="app-logo-large">
        <h1 class="title-text">SURAKSHIT YATRA</h1>
        <p class="subtitle-text">Smart driver monitoring and management system</p>
    </div>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
    </audio>

    <script>
        let hasStarted = false;
        const music = document.getElementById('bg-music');

        function removeWhiteBackground(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Wait for image to load if not already
            if (!img.complete) {
                img.onload = () => removeWhiteBackground(img);
                return;
            }

            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Threshold for what we consider "white" (240-255)
            const threshold = 240;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // If the pixel is white or near-white, make it transparent
                if (r > threshold && g > threshold && b > threshold) {
                    data[i + 3] = 0; // Set Alpha to 0
                }
            }

            ctx.putImageData(imageData, 0, 0);
            img.src = canvas.toDataURL();
            img.style.mixBlendMode = 'normal'; // Reset blend mode
        }

        function startExperience() {
            if (hasStarted) return;
            hasStarted = true;

            // Unlock audio
            music.volume = 0.5;
            music.play().catch(e => console.log("Audio play error:", e));

            // Add animation class
            document.body.classList.add('started');

            // Automatically transition to language selection after sequence
            setTimeout(proceed, 10000);
        }

        function proceed() {
            // Fade out music
            const fadeInterval = setInterval(() => {
                if (music.volume > 0.05) {
                    music.volume -= 0.05;
                } else {
                    music.pause();
                    clearInterval(fadeInterval);
                }
            }, 50);

            document.body.style.transition = "opacity 1.5s";
            document.body.style.opacity = "0";

            setTimeout(() => {
                window.location.href = '/language-select';
            }, 1200);
        }

        window.onload = () => {
            // Process both logos
            const logos = document.querySelectorAll('img[src*="logo_icon"]');
            logos.forEach(img => removeWhiteBackground(img));
        };
    </script>
</body>

</html>
